<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <div class="top-bar">
            <button id="inventoryBtn" class="icon-btn" title="Инвентарь">
                <canvas class="icon-canvas" data-icon="inventory" width="32" height="32"></canvas>
            </button>
            <button id="craftBtn" class="icon-btn" title="Крафт">
                <canvas class="icon-canvas" data-icon="craft" width="32" height="32"></canvas>
            </button>
            <button id="restBtn" class="icon-btn" title="Отдых">
                <canvas class="icon-canvas" data-icon="rest" width="32" height="32"></canvas>
            </button>
            <button id="perksBtn" class="icon-btn" title="Перки">
                <canvas class="icon-canvas" data-icon="perks" width="32" height="32"></canvas>
            </button>
            <button id="chatToggleBtn" class="icon-btn" title="Чат">
                <canvas class="icon-canvas" data-icon="chat-open" width="32" height="32"></canvas>
            </button>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <canvas class="status-icon" data-icon="health" width="16" height="16"></canvas>
                <span id="hpValue">100</span>
            </div>
            <div class="status-item">
                <canvas class="status-icon" data-icon="food" width="16" height="16"></canvas>
                <span id="foodValue">100</span>
            </div>
            <div class="status-item">
                <canvas class="status-icon" data-icon="water" width="16" height="16"></canvas>
                <span id="waterValue">100</span>
            </div>
            <div class="status-item exp-container" title="Опыт">
                <div class="exp-circle-wrapper">
                    <svg class="exp-circle" width="36" height="36" viewBox="0 0 72 72">
                        <!-- Фоновый круг -->
                        <circle class="exp-circle-bg" cx="36" cy="36" r="30" fill="none" stroke="#2a1a0a" stroke-width="5"/>
                        <!-- Прогресс (будет заполняться через JS) -->
                        <circle id="expCircleProgress" class="exp-circle-progress" cx="36" cy="36" r="30" fill="none" 
                                stroke="#ffd700" stroke-width="5" stroke-linecap="round"
                                stroke-dasharray="188.495" stroke-dashoffset="188.495" 
                                transform="rotate(-90 36 36)"/>
                        <!-- Текст уровня -->
                        <text x="36" y="42" text-anchor="middle" fill="#ffd700" font-size="18" font-weight="bold" font-family="monospace">
                            <tspan id="levelValue">1</tspan>
                        </text>
                    </svg>
                </div>
            </div>
        </div>
        
        <div id="chatPanel" class="chat-panel">
            <div class="chat-messages" id="chatMessages"></div>
        </div>
        
        <div id="choiceModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Событие</h3>
                <p id="modalText"></p>
                <div id="modalOptions"></div>
            </div>
        </div>
        
        <div id="inventoryModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>📦 ИНВЕНТАРЬ</h3>
                <div class="equipment-section">
                    <div class="equipment-slot">
                        <h4>⚔️ Оружие</h4>
                        <div id="currentWeaponSlot" class="equipment-item"></div>
                        <div class="weapon-switch">
                            <button id="prevWeaponBtn" class="switch-btn">◀</button>
                            <button id="nextWeaponBtn" class="switch-btn">▶</button>
                        </div>
                    </div>
                    <div class="equipment-slot">
                        <h4>🛡️ Броня</h4>
                        <div id="currentArmorSlot" class="equipment-item"></div>
                        <div class="armor-switch">
                            <button id="prevArmorBtn" class="switch-btn">◀</button>
                            <button id="nextArmorBtn" class="switch-btn">▶</button>
                        </div>
                    </div>
                </div>
                <h4>📦 Предметы</h4>
                <div id="inventoryList" class="inventory-grid"></div>
                <button id="closeInventoryBtn" class="modal-close">Закрыть</button>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="texts.js"></script>
    <script src="modules/Perks.js"></script>
    <script src="modules/Player.js"></script>
    <script src="modules/Combat.js"></script>
    <script src="modules/UI.js"></script>
    <script src="modules/Events.js"></script>
    <script src="modules/Renderer.js"></script>
    <script src="modules/Inventory.js"></script>
    <script src="modules/RestManager.js"></script>
    <script src="game.js"></script>
</body>
</html>
